<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Équipe - Bordeaux Activités</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="index.html" class="logo">
                <img src="assets/images/logo/nnoir.svg" alt="Logo Bordeaux Activités" class="logo-light">
                <img src="assets/images/logo/bblanc.svg" alt="Logo Bordeaux Activités" class="logo-dark">
            </a>
            <nav>
                <ul>
                    <li><a href="index.html" class="">Accueil</a></li>
                    <li><a href="about.html" class="">À propos</a></li>
                    <li><a href="contact.html" class="">Contact</a></li>
                    <li><a href="teams.html" class="active">Équipe</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <script>
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;

        const savedTheme = localStorage.getItem('theme') || 'light';
        html.setAttribute('data-theme', savedTheme);

        if (themeToggle) {
            themeToggle.addEventListener('click', () => {
                const currentTheme = html.getAttribute('data-theme');
                const newTheme = currentTheme === 'light' ? 'dark' : 'light';
                html.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
            });
        }
    </script>

    <section class="page-hero">
        <div class="hero-content">
            <h2>Notre équipe</h2>
            <p>Les passionnés qui font vivre Bordeaux Activités</p>
        </div>
    </section>

    <section class="page-content">
        <div class="container">
            <div class="team-section">
                <div class="team-block">
                    <span class="team-role">Direction</span>
                    <div class="team-names">
                        <span class="team-member" data-role="Direction">Clément</span>
                    </div>
                </div>
                <div class="team-block">
                    <span class="team-role">Communication</span>
                    <div class="team-names">
                        <span class="team-member" data-role="Communication">Charlène</span>
                        <span class="team-member" data-role="Communication">Amandine</span>
                        <span class="team-member" data-role="Communication">Maëlle</span>
                    </div>
                </div>
                <div class="team-block">
                    <span class="team-role">Événementiel</span>
                    <div class="team-names">
                        <span class="team-member" data-role="Événementiel">Lucie</span>
                        <span class="team-member" data-role="Événementiel">Mélanie</span>
                        <span class="team-member" data-role="Événementiel">Déborah</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 Nos Reportages. Tous droits réservés.</p>
        </div>
    </footer>

    <script>
        document.querySelectorAll('.team-member').forEach(member => {
            member.addEventListener('mouseenter', function() {
                if (!this.dataset.original) {
                    this.dataset.original = this.textContent;
                }
                this.textContent = this.dataset.role;
                this.classList.add('hovered');
            });
            member.addEventListener('mouseleave', function() {
                if (this.dataset.original) {
                    this.textContent = this.dataset.original;
                    this.classList.remove('hovered');
                }
            });
        });
    </script>
</body>
</html>
