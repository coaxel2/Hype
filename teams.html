<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Équipe - Bordeaux Activités</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="index.html" class="logo">
                <img src="assets/images/logo/nnoir.svg" alt="Logo Bordeaux Activités" class="logo-light">
                <img src="assets/images/logo/bblanc.svg" alt="Logo Bordeaux Activités" class="logo-dark">
            </a>
            <nav>
                <ul>
                    <li><a href="index.html" class="">Accueil</a></li>
                    <li><a href="about.html" class="">À propos</a></li>
                    <li><a href="contact.html" class="">Contact</a></li>
                    <li><a href="teams.html" class="active">Équipe</a></li>
                </ul>
            </nav>
    </header>
    <script>
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;

        const savedTheme = localStorage.getItem('theme') || 'light';
        html.setAttribute('data-theme', savedTheme);

        if (themeToggle) {
            themeToggle.addEventListener('click', () => {
                const currentTheme = html.getAttribute('data-theme');
                const newTheme = currentTheme === 'light' ? 'dark' : 'light';
                html.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
            });
        }
    </script>

<section class="page-content">
    <div class="container">
        <h2 class="team-title">L'équipe</h2>
        <div class="team-list">
            <div class="team-block">
                <span class="team-role">Direction</span>
                <span class="team-member" data-role="Direction">Clément</span>
            </div>
            <div class="team-block">
                <span class="team-role">Communication</span>
                <span class="team-member" data-role="Communication">Charlène</span>
                <span class="team-member" data-role="Communication">Amandine</span>
                <span class="team-member" data-role="Communication">Maëlle</span>
            </div>
            <div class="team-block">
                <span class="team-role">Événementiel</span>
                <span class="team-member" data-role="Événementiel">Lucie</span>
                <span class="team-member" data-role="Événementiel">Mélanie</span>
                <span class="team-member" data-role="Événementiel">Déborah</span>
            </div>
        </div>
    </div>
</section>

    <footer>
        <div class="container">
            <p>&copy; 2026 Nos Reportages. Tous droits réservés.</p>
        </div>
    </footer>

<script>
document.querySelectorAll('.team-member').forEach(member => {
    member.addEventListener('mouseenter', function() {
        if (!this.dataset.original) {
            this.dataset.original = this.textContent;
        }
        this.textContent = this.dataset.role;
        this.classList.add('hovered');
    });
    member.addEventListener('mouseleave', function() {
        if (this.dataset.original) {
            this.textContent = this.dataset.original;
            this.classList.remove('hovered');
        }
    });
});
</script>

<style>
.page-content {
    padding: 80px 0;
    background: white;
}
.team-title {
    text-align: center;
    font-size: 2.5rem;
    margin-bottom: 2.5rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--primary-color, #e57373);
}
.team-list {
    max-width: 700px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 50px;
}
.team-block {
    display: flex;
    align-items: center;
    gap: 30px;
    border-bottom: 1.5px solid #222;
    padding-bottom: 30px;
    flex-wrap: wrap;
}
.team-role {
    min-width: 150px;
    font-size: 1.1rem;
    letter-spacing: 0.12em;
    color: #444;
    text-transform: uppercase;
    font-weight: 500;
}
.team-member {
    font-size: 2rem;
    color: #222;
    font-weight: 400;
    cursor: pointer;
    transition: color 0.2s, background 0.2s;
    background: none;
    border-radius: 6px;
    padding: 0 10px;
    display: inline-block;
}
.team-member.hovered {
    color: var(--primary-color, #e57373);
    background: #fbe9e7;
}
@media (max-width: 600px) {
    .team-block {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
        padding-bottom: 20px;
    }
    .team-member {
        font-size: 1.2rem;
    }
    .team-role {
        min-width: 0;
    }
}
</style>
</body>
</html>
